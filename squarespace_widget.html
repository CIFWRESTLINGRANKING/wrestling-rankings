<!--
============================================================================
 CALIFORNIA HS WRESTLING RANKINGS — Squarespace Code Block widget
============================================================================
 HOW TO USE
 1. Host your rankings.json somewhere public (GitHub Pages, Cloudflare Pages,
    S3, etc.). Make sure that host allows cross-origin reads (CORS) — GitHub
    Pages and most static hosts do by default.
 2. Set DATA_URL below to that file's URL.
 3. In Squarespace: Edit a page → add a Code Block → paste ALL of this.
    (JavaScript in Code Blocks needs a Core plan or higher.)
 4. It renders weight-class tabs + a top-40 leaderboard, fetched live from
    your JSON. Re-run the Python pipeline + re-upload rankings.json and the
    page updates itself — no editing Squarespace again.

 It ships with sample data baked in, so it shows something the moment you
 paste it, even before DATA_URL is live.

 The numeric "rating ±" and the little confidence bar are the point: a tight
 bar = a proven wrestler with lots of matches; a wide bar = provisional, not
 enough mat time yet. That uncertainty is what separates this from a hand-
 voted list.
============================================================================
-->

<div id="cawrestle-rankings" data-loading="true">
  <div class="cwr-shell">
    <header class="cwr-head">
      <div class="cwr-titlewrap">
        <h2 class="cwr-title">California Wrestling Rankings</h2>
        <p class="cwr-sub">Algorithmic — every wrestler's full record, weighted by who they beat.</p>
      </div>
      <div class="cwr-meta"><span class="cwr-updated">—</span></div>
    </header>
    <nav class="cwr-genders" aria-label="Gender"></nav>
    <nav class="cwr-tabs" aria-label="Weight class"></nav>
    <div class="cwr-board"></div>
    <footer class="cwr-foot">
      <span class="cwr-legend"><span class="cwr-whisker-demo"></span> rating ± uncertainty (wider = fewer matches)</span>
    </footer>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap');

#cawrestle-rankings{
  --ink:#16181d; --muted:#6b7178; --faint:#9aa0a6; --line:#e7e8ec;
  --surface:#ffffff; --rail:#f6f6f4; --accent:#c8102e; --accent-tint:#fbe8eb;
  --whisker:#cdd0d6; --pad:clamp(14px,3vw,26px);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  max-width:760px; margin:0 auto; line-height:1.45; text-align:left;
}
#cawrestle-rankings *{box-sizing:border-box;}
#cawrestle-rankings .cwr-shell{
  background:var(--surface); border:1px solid var(--line); border-radius:14px;
  overflow:hidden;
}
#cawrestle-rankings .cwr-head{
  display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
  padding:var(--pad); border-bottom:1px solid var(--line);
}
#cawrestle-rankings .cwr-title{
  font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:.01em;
  text-transform:uppercase; font-size:clamp(20px,3.4vw,28px); margin:0; line-height:1.05;
}
#cawrestle-rankings .cwr-sub{margin:.35em 0 0; color:var(--muted); font-size:13px; max-width:46ch;}
#cawrestle-rankings .cwr-meta{text-align:right; white-space:nowrap;}
#cawrestle-rankings .cwr-updated{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px;
  color:var(--faint); text-transform:uppercase; letter-spacing:.06em;
}
#cawrestle-rankings .cwr-genders{
  display:flex; gap:0; padding:14px var(--pad) 0;
}
#cawrestle-rankings .cwr-gender{
  font-family:'Oswald',sans-serif; font-weight:700; font-size:14px;
  letter-spacing:.04em; text-transform:uppercase;
  padding:8px 22px; border:1px solid var(--line); background:#fff;
  color:var(--muted); cursor:pointer; transition:.15s;
}
#cawrestle-rankings .cwr-gender:first-child{border-radius:8px 0 0 8px;}
#cawrestle-rankings .cwr-gender:last-child{border-radius:0 8px 8px 0; border-left:0;}
#cawrestle-rankings .cwr-gender[aria-selected="true"]{
  background:var(--accent,#b1232a); color:#fff; border-color:var(--accent,#b1232a);
}
#cawrestle-rankings .cwr-tabs{
  display:flex; gap:6px; flex-wrap:wrap; padding:12px var(--pad);
  background:var(--rail); border-bottom:1px solid var(--line);
}
#cawrestle-rankings .cwr-tab{
  font-family:'Oswald',sans-serif; font-weight:600; font-size:13px;
  padding:6px 12px; border-radius:999px; border:1px solid var(--line);
  background:#fff; color:var(--muted); cursor:pointer; transition:.15s;
}
#cawrestle-rankings .cwr-tab:hover{border-color:var(--faint); color:var(--ink);}
#cawrestle-rankings .cwr-tab[aria-selected="true"]{
  background:var(--ink); color:#fff; border-color:var(--ink);
}
#cawrestle-rankings .cwr-row{
  display:grid; grid-template-columns:38px 1fr auto 132px; align-items:center;
  gap:12px; padding:10px var(--pad); border-bottom:1px solid var(--line);
}
#cawrestle-rankings .cwr-grade{
  font-size:10px; font-weight:700; color:var(--muted);
  border:1px solid var(--line); border-radius:4px; padding:1px 5px;
  margin-left:6px; vertical-align:middle;
}
#cawrestle-rankings .cwr-row:last-child{border-bottom:0;}
#cawrestle-rankings .cwr-row.cwr-head-row{
  padding-top:10px; padding-bottom:8px; border-bottom:1px solid var(--ink);
}
#cawrestle-rankings .cwr-th{
  font-size:10.5px; text-transform:uppercase; letter-spacing:.07em;
  color:var(--faint); font-weight:600;
}
#cawrestle-rankings .cwr-th.cwr-rt{text-align:left;}
#cawrestle-rankings .cwr-rank{
  font-family:'Oswald',sans-serif; font-weight:700; font-size:20px;
  color:var(--ink); text-align:center;
}
#cawrestle-rankings .cwr-row.cwr-top .cwr-rank{color:var(--accent);}
#cawrestle-rankings .cwr-name{font-weight:600; font-size:15px;}
#cawrestle-rankings .cwr-team{color:var(--muted); font-size:12.5px; margin-top:1px;}
#cawrestle-rankings .cwr-rec{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px;
  color:var(--muted);
}
#cawrestle-rankings .cwr-rt{display:flex; flex-direction:column; gap:4px;}
#cawrestle-rankings .cwr-rtnum{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px;
  color:var(--ink); white-space:nowrap;
}
#cawrestle-rankings .cwr-rtnum b{font-weight:700;}
#cawrestle-rankings .cwr-rtnum span{color:var(--faint);}
#cawrestle-rankings .cwr-bar{position:relative; height:4px; background:var(--rail); border-radius:3px;}
#cawrestle-rankings .cwr-whisker{
  position:absolute; top:0; height:4px; background:var(--whisker); border-radius:3px;
}
#cawrestle-rankings .cwr-dot{
  position:absolute; top:-2px; width:8px; height:8px; border-radius:50%;
  background:var(--ink); transform:translateX(-50%);
}
#cawrestle-rankings .cwr-row.cwr-top .cwr-dot{background:var(--accent);}
#cawrestle-rankings .cwr-foot{padding:12px var(--pad); display:flex; justify-content:flex-end;}
#cawrestle-rankings .cwr-legend{
  display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--faint);
}
#cawrestle-rankings .cwr-whisker-demo{
  width:34px; height:4px; border-radius:3px; background:var(--whisker); position:relative; display:inline-block;
}
#cawrestle-rankings .cwr-whisker-demo::after{
  content:""; position:absolute; left:50%; top:-2px; width:8px; height:8px;
  border-radius:50%; background:var(--ink); transform:translateX(-50%);
}
#cawrestle-rankings .cwr-empty{padding:40px var(--pad); text-align:center; color:var(--muted);}
@media (max-width:560px){
  #cawrestle-rankings .cwr-row{grid-template-columns:30px 1fr 104px; }
  #cawrestle-rankings .cwr-rec{display:none;}
  #cawrestle-rankings .cwr-th.cwr-rec-h{display:none;}
}
</style>

<script>
(function(){
  // ---- 1. CONFIG: point this at your hosted rankings.json --------------
  var DATA_URL = "https://cifwrestlingranking.github.io/wrestling-rankings/rankings.json";

  // ---- 2. Baked-in sample so it renders before DATA_URL is set ---------
  var FALLBACK = {
    "generated":"2026-06-24","title":"California HS Wrestling Rankings",
    "weights":[{"weight":126,"wrestlers":[
      {"rank":1,"name":"Paul Ruiz","section":"CS","record":"10-2","rating":1858,"rd":140},
      {"rank":2,"name":"Issac Torres","section":"SS","record":"4-0","rating":1846,"rd":202},
      {"rank":3,"name":"Siraj Sidhu","section":"CS","record":"6-3","rating":1721,"rd":153},
      {"rank":4,"name":"Sean Willcox","section":"SS","record":"5-2","rating":1723,"rd":169},
      {"rank":5,"name":"Thunder Lewis","section":"NC","record":"3-1","rating":1721,"rd":197},
      {"rank":6,"name":"Aaron Meza","section":"SS","record":"2-1","rating":1623,"rd":221},
      {"rank":7,"name":"Caden Garriott","section":"SS","record":"2-1","rating":1623,"rd":221},
      {"rank":8,"name":"Massimo Ortiz","section":"SS","record":"1-0","rating":1678,"rd":284},
      {"rank":9,"name":"Elias Castaneda","section":"SJ","record":"2-2","rating":1468,"rd":193},
      {"rank":10,"name":"Aaron Silva","section":"SS","record":"2-2","rating":1469,"rd":202},
      {"rank":11,"name":"Julian Holguin","section":"CC","record":"1-1","rating":1535,"rd":245},
      {"rank":12,"name":"Nate Mitchell","section":"SJ","record":"1-1","rating":1470,"rd":230},
      {"rank":13,"name":"Jackson Humphrey","section":"SS","record":"1-2","rating":1414,"rd":207},
      {"rank":14,"name":"Ricardo Ortiz","section":"SD","record":"1-1","rating":1500,"rd":253},
      {"rank":15,"name":"Luke Schoch","section":"CC","record":"1-2","rating":1403,"rd":209},
      {"rank":16,"name":"Max Torrez","section":"CC","record":"1-2","rating":1417,"rd":225}
    ]}]
  };

  var root = document.getElementById("cawrestle-rankings");
  if(!root) return;
  var gendersEl = root.querySelector(".cwr-genders");
  var tabsEl = root.querySelector(".cwr-tabs");
  var boardEl = root.querySelector(".cwr-board");
  var updatedEl = root.querySelector(".cwr-updated");
  var data = null, gender = "boys", active = 0;

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}

  function boardsFor(g){
    return (data.weights||[]).filter(function(w){
      return (w.gender||"boys") === g; });
  }
  function genders(){
    var seen = {}, out = [];
    (data.weights||[]).forEach(function(w){
      var g = w.gender||"boys"; if(!seen[g]){seen[g]=1; out.push(g);} });
    return out.length ? out : ["boys"];
  }

  function render(){
    if(!data || !data.weights || !data.weights.length){
      boardEl.innerHTML = '<div class="cwr-empty">No rankings to show yet. '
        + 'Set DATA_URL to your rankings.json.</div>';
      return;
    }
    updatedEl.textContent = "Updated " + (data.generated || "");
    // gender toggle (hidden if only one gender present)
    var gs = genders();
    gendersEl.innerHTML = "";
    gendersEl.style.display = gs.length>1 ? "flex" : "none";
    gs.forEach(function(g){
      var b = document.createElement("button");
      b.className = "cwr-gender";
      b.textContent = g.charAt(0).toUpperCase()+g.slice(1);
      b.setAttribute("aria-selected", g===gender ? "true":"false");
      b.onclick = function(){ gender=g; active=0; render(); };
      gendersEl.appendChild(b);
    });
    // weight tabs for the active gender
    var boards = boardsFor(gender);
    if(active >= boards.length) active = 0;
    tabsEl.innerHTML = "";
    boards.forEach(function(w,i){
      var b = document.createElement("button");
      b.className = "cwr-tab"; b.textContent = w.weight + " lb";
      b.setAttribute("aria-selected", i===active ? "true":"false");
      b.onclick = function(){ active=i; render(); };
      tabsEl.appendChild(b);
    });
    // board
    var ws = ((boards[active]||{}).wrestlers)||[];
    if(!ws.length){ boardEl.innerHTML='<div class="cwr-empty">No data for this weight yet.</div>'; return; }
    var ratings = ws.map(function(x){return x.rating;});
    var lo = Math.min.apply(null,ratings), hi = Math.max.apply(null,ratings);
    var span = (hi-lo)||1;
    var rows = ['<div class="cwr-row cwr-head-row">'
      + '<div class="cwr-th">#</div><div class="cwr-th">Wrestler</div>'
      + '<div class="cwr-th cwr-rec-h">Record</div>'
      + '<div class="cwr-th cwr-rt">Rating</div></div>'];
    ws.forEach(function(x){
      var pct = function(v){return ((v-lo)/span)*100;};
      var left = Math.max(0, pct(x.rating - x.rd));
      var right = Math.min(100, pct(x.rating + x.rd));
      var width = Math.max(2, right-left);
      var dot = pct(x.rating);
      var sub = x.team ? (esc(x.team)+' · '+esc(x.section||"")) : esc(x.section||"");
      var grd = x.grade ? ' <span class="cwr-grade">'+esc(x.grade)+'</span>' : '';
      var prov = x.incomplete ? ' <span class="cwr-prov" title="Provisional — some bouts (e.g. consolation-bracket losses) not yet in the data">\u25CB</span>' : '';
      rows.push(
        '<div class="cwr-row'+(x.rank<=3?' cwr-top':'')+'">'
        + '<div class="cwr-rank">'+x.rank+'</div>'
        + '<div><div class="cwr-name">'+esc(x.name)+grd+prov+'</div>'
        +   '<div class="cwr-team">'+sub+'</div></div>'
        + '<div class="cwr-rec">'+esc(x.record||"")+'</div>'
        + '<div class="cwr-rt">'
        +   '<div class="cwr-rtnum"><b>'+x.rating+'</b> <span>± '+x.rd+'</span></div>'
        +   '<div class="cwr-bar"><div class="cwr-whisker" style="left:'+left+'%;width:'+width+'%"></div>'
        +     '<div class="cwr-dot" style="left:'+dot+'%"></div></div>'
        + '</div></div>');
    });
    boardEl.innerHTML = rows.join("");
  }

  function boot(d){ data = d; root.removeAttribute("data-loading"); render(); }

  if(DATA_URL){
    fetch(DATA_URL,{cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(boot)
      .catch(function(){ boot(FALLBACK); /* falls back if the URL isn't ready */ });
  } else {
    boot(FALLBACK);
  }
})();
</script>
